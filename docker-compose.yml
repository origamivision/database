
services:
  mysql_db_container:
    image: mysql@sha256:24e450bbd24f621c71b10404c946cc9ea1cbb0e6e7464b2be2de5193dcf1d05b
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - 127.0.0.1:${MYSQL_PORT:-3306}:3306
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
      - mysql_db_data_container:/var/lib/mysql

  adminer_container:
    image: adminer@sha256:16a72c6140f64d00a3a9edf8d3d3b18a7b0a29ca31b0453378d9eb71f01f9e34
    restart: unless-stopped
    depends_on:
      mysql_db_container:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: mysql_db_container
    ports:
      - 127.0.0.1:${ADMINER_PORT:-8080}:8080

volumes:
  mysql_db_data_container:
